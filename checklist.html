<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>F29 최종 확인서 · Gate</title>
<meta name="description" content="앞의 다섯 단계를 거친 마지막 관문. 6개 게이트를 통과하고, 오늘의 매수가 규칙에 따른 행동임을 스스로 서명합니다.">
<meta name="theme-color" content="#0A0E17">
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap">
<style>
:root{
  --bg:#0A0E17; --card:#131A28; --card2:#0F1520;
  --line:#1F2A3D; --line2:#2C3A54;
  --txt:#E8EDF7; --txt2:#8B9AB5; --txt3:#5A6B84;
  --pass:#3DD8B0; --watch:#D8B45F; --stop:#E5484D;
  --teal:#3DD8B0; --purple:#9D7BEA; --pink:#E85D9C; --gold:#D8B45F;
}
*{box-sizing:border-box}
html,body{margin:0}
body{background:var(--bg); color:var(--txt);
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;
  -webkit-font-smoothing:antialiased; padding:0}
.mono{font-family:'JetBrains Mono',ui-monospace,monospace}
#app{max-width:560px; margin:0 auto; padding:24px 18px 50px; animation:fade .5s ease}
@keyframes fade{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
button{font-family:inherit; cursor:pointer}
button:focus-visible{outline:2px solid var(--gold); outline-offset:2px}

.brand{display:flex; align-items:baseline; gap:10px}
.brand .logo{font-family:'JetBrains Mono',monospace; font-size:24px; font-weight:800; letter-spacing:-1px}
.brand .logo b{color:var(--gold)}
.brand .name{font-size:17px; font-weight:700}
.nav{display:flex; gap:6px; flex-wrap:wrap; margin:14px 0 0}
.nav a{font-size:11.5px; padding:5px 10px; border-radius:20px; text-decoration:none;
  color:var(--txt2); background:var(--card); border:1px solid var(--line)}
.nav a.on{color:var(--bg); background:var(--gold); border-color:var(--gold); font-weight:700}
.lede{margin:16px 0 0; font-size:13px; color:var(--txt2); line-height:1.55}
.lede b{color:var(--txt)}

.gates{margin-top:16px; display:flex; flex-direction:column; gap:10px}
.gate{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:14px 15px;
  transition:border-color .2s}
.gate[data-on="yes"]{border-color:#3DD8B055}
.gate[data-on="no"]{border-color:#E5484D66}
.gate .q{display:flex; align-items:flex-start; gap:11px; margin-bottom:11px}
.gate .num{font-family:'JetBrains Mono',monospace; font-size:12px; font-weight:700; color:var(--gold);
  min-width:20px; margin-top:1px}
.gate .qt{font-size:14px; font-weight:600; line-height:1.45}
.gate .qs{display:block; font-size:11.5px; color:var(--txt2); font-weight:400; margin-top:3px}
.gate .opts{display:grid; grid-template-columns:1fr 1fr; gap:8px}
.gate .opt{padding:9px 12px; border-radius:8px; border:1px solid var(--line); background:var(--card2);
  color:var(--txt2); font-size:13px; font-weight:600; transition:all .15s}
.gate .opt.yes.on{background:#3DD8B01E; border-color:#3DD8B088; color:var(--txt)}
.gate .opt.no.on{background:#E5484D1E; border-color:#E5484D88; color:#fff}

/* 서명 */
.sign{margin-top:16px; border-radius:14px; overflow:hidden; border:2px solid var(--line); background:var(--card)}
.sign.locked{opacity:.5; pointer-events:none}
.sign.ready{border-color:#D8B45F88}
.sign-bar{padding:9px 16px; background:#D8B45F16; border-bottom:1px solid #D8B45F33;
  font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; color:var(--gold); font-weight:700}
.sign.locked .sign-bar{background:#5A6B8412; border-bottom-color:#5A6B8433; color:var(--txt3)}
.sign-body{padding:18px 18px 20px}
.sign-stmt{font-size:14px; font-weight:600; line-height:1.6; color:var(--txt)}
.sign-check{display:flex; align-items:center; gap:11px; margin-top:14px; padding:12px 14px;
  border-radius:9px; background:var(--card2); border:1px solid var(--line)}
.sign-check.on{background:#D8B45F14; border-color:#D8B45F77}
.sign-box{width:20px; height:20px; border-radius:5px; flex-shrink:0; border:1.5px solid var(--txt3);
  display:flex; align-items:center; justify-content:center; color:var(--bg); font-size:13px; font-weight:800}
.sign-check.on .sign-box{background:var(--gold); border-color:var(--gold)}
.sign-check .lbl{font-size:12.5px; color:var(--txt2); line-height:1.4}
.sign-check.on .lbl{color:var(--txt)}
.sign-btn{width:100%; margin-top:14px; padding:13px; border-radius:10px; border:none;
  font-size:14px; font-weight:800; background:var(--gold); color:var(--bg); letter-spacing:-.2px}
.sign-btn:disabled{background:var(--card2); color:var(--txt3); cursor:not-allowed}
.locknote{font-size:11.5px; color:var(--txt3); margin-top:8px; line-height:1.5}

/* 결과 */
.result{margin-top:16px; border-radius:14px; overflow:hidden; display:none}
.result.show{display:block}
.result.stop{border:2px solid #E5484D88; background:linear-gradient(180deg,#E5484D14,var(--card))}
.result.pass{border:2px solid #3DD8B088; background:linear-gradient(180deg,#3DD8B012,var(--card))}
.result-bar{padding:9px 18px; font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:2px; font-weight:700}
.result.stop .result-bar{background:#E5484D22; color:var(--stop); border-bottom:1px solid #E5484D33}
.result.pass .result-bar{background:#3DD8B022; color:var(--pass); border-bottom:1px solid #3DD8B033}
.result-body{padding:20px 20px 22px}
.result-big{font-size:26px; font-weight:800; letter-spacing:-.6px; margin-bottom:10px}
.result.stop .result-big{color:var(--stop)}
.result.pass .result-big{color:var(--pass)}
.result-text{font-size:13.5px; color:var(--txt); line-height:1.65}
.result-sub{margin-top:14px; padding-top:13px; border-top:1px dashed #5A6B8444;
  font-size:13px; color:var(--txt2); font-style:italic}

.disclaimer{font-family:'JetBrains Mono',monospace; font-size:9.5px; color:var(--txt3);
  text-align:center; margin-top:20px; line-height:1.7; letter-spacing:.3px}
@media (prefers-reduced-motion:reduce){#app{animation:none}}
.copyright{font-family:'JetBrains Mono',monospace; font-size:9px; color:var(--txt3);
  text-align:center; margin-top:16px; padding-top:14px; border-top:1px solid var(--line);
  line-height:1.75; letter-spacing:.2px}

/* ===== 포털 헤더 (스코프: .portal-nav) ===== */
.portal-nav{position:sticky;top:0;z-index:50;background:rgba(10,14,23,.82);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
.portal-nav .nav-in{max-width:1080px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;gap:34px}
.portal-brand{display:flex;align-items:center;gap:9px;text-decoration:none}
.portal-brand .mark{width:26px;height:26px;flex-shrink:0}
.portal-brand .wm{font-size:1.28rem;font-weight:800;letter-spacing:.02em;color:var(--txt);line-height:1.6}
.portal-nav .navlinks{display:flex;gap:26px;margin-left:8px}
.portal-nav .navlinks a{text-decoration:none;color:var(--txt2);font-size:.86rem;font-weight:600;transition:color .16s;white-space:nowrap}
.portal-nav .navlinks a:hover{color:var(--txt)}
.portal-nav .navlinks a.active{color:var(--teal)}
.portal-nav .navlinks a .en{display:block;font-size:.62rem;color:var(--txt3);font-weight:500;letter-spacing:.04em;margin-top:1px}
.portal-nav .navlinks a.active .en{color:var(--teal);opacity:.7}
.portal-nav .nav-lang{margin-left:auto;display:flex;gap:3px}
.portal-nav .nav-lang button{background:transparent;border:1px solid var(--line);color:var(--txt3);border-radius:6px;padding:4px 9px;font-size:.68rem;cursor:pointer;font-family:inherit;transition:all .16s}
.portal-nav .nav-lang button:hover{border-color:var(--line2);color:var(--txt2)}
.portal-nav .nav-lang button.on{border-color:var(--teal);color:var(--teal)}
@media(max-width:820px){.portal-nav .navlinks{display:none}.portal-nav .nav-in{gap:0}}
/* ===== 포털 푸터 ===== */
footer{margin-top:40px;border-top:1px solid var(--line);padding:30px 0 46px}
.foot-in{max-width:1080px;margin:0 auto;padding:0 24px}
.foot-brand{font-size:.9rem;font-weight:700;color:var(--txt2)}
.foot-contact{margin-top:12px;font-size:.78rem;color:var(--txt2)}
.foot-contact .em{color:var(--teal);font-weight:600;unicode-bidi:bidi-override}
.foot-dis{margin-top:12px;font-size:.72rem;color:var(--txt3);line-height:1.65;max-width:620px}
.foot-copy{margin-top:14px;padding-top:12px;border-top:1px solid var(--line);font-size:.7rem;color:var(--txt3);line-height:1.6}

/* ===== 플레이북 브랜드 라벨 + 헤드카피 ===== */
.pb-label{display:flex;align-items:center;gap:9px;margin-bottom:14px}
.pb-label .f{font-family:'JetBrains Mono',monospace;font-size:.8rem;font-weight:800;color:var(--teal);letter-spacing:.5px}
.pb-label .t{font-size:.92rem;font-weight:700;color:var(--txt);letter-spacing:-.2px}
.pb-label .t b{color:var(--txt)}
.headline{margin:22px 0 0}
.headline h1{font-size:2.6rem;font-weight:800;letter-spacing:-1.5px;color:var(--txt);line-height:1.1}
.headline .phil{margin-top:14px;font-size:1.02rem;line-height:1.55;color:var(--txt2);font-weight:500;max-width:480px}
.headline .phil b{color:var(--teal)}
</style>

<div id="app">

<script>
(function(){
  "use strict";
  var el=function(id){return document.getElementById(id);};
  var GATES=[
    { t:"지금 이유가 판단인가, 충동인가", s:"뉴스·급등을 보고 급해진 게 아니라, 미리 세운 근거로 사는가" },
    { t:"실패조건까지 작성했는가", s:"「왜 사는가」에서 틀렸을 때 팔 조건을 관찰 가능한 사실로 적었는가" },
    { t:"틀렸을 때 인정할 가격 조건이 있는가", s:"「가격은 말이 되는가」에서 가격의 실패조건을 정했는가" },
    { t:"틀려도 계좌가 살아남는가", s:"「얼마나 살까」에서 이 비중이면 -30%가 나도 감당 가능한가" },
    { t:"F29 원칙을 어기지 않았는가", s:"「투자 원칙」 중 지금 이 매수가 어기는 게 하나도 없는가" },
    { t:"오늘 안 사는 것도 받아들일 수 있는가", s:"가장 어려운 행동은 매수가 아니라 안 사는 것이다. 그걸 선택으로 받아들이는가" }
  ];
  var ans=new Array(GATES.length).fill(null); // 'yes'|'no'|null
  var signed=false;

  var host=el("gates");
  GATES.forEach(function(g,i){
    var d=document.createElement("div");
    d.className="gate"; d.setAttribute("data-on","");
    d.innerHTML=
      '<div class="q"><span class="num">'+String(i+1).padStart(2,"0")+'</span>'+
        '<span class="qt"></span></div>'+
      '<div class="opts">'+
        '<button class="opt yes" type="button" data-v="yes">YES</button>'+
        '<button class="opt no" type="button" data-v="no">NO</button>'+
      '</div>';
    var qt=d.querySelector(".qt");
    qt.textContent=g.t;
    var sub=document.createElement("span"); sub.className="qs"; sub.textContent=g.s; qt.appendChild(sub);
    var opts=d.querySelectorAll(".opt");
    opts.forEach(function(b){
      b.addEventListener("click",function(){
        var v=b.getAttribute("data-v");
        var already=ans[i]===v;
        ans[i]=already?null:v;
        d.setAttribute("data-on", already?"":v);
        opts.forEach(function(x){ x.classList.toggle("on", !already && x===b); });
        // 게이트를 바꾸면 서명·결과 리셋
        signed=false;
        el("sign-check").classList.remove("on"); el("sign-box").textContent="";
        el("result").classList.remove("show");
        update();
      });
    });
    host.appendChild(d);
  });

  el("sign-check").addEventListener("click",function(){
    if(el("sign").classList.contains("locked"))return;
    var on=!el("sign-check").classList.contains("on");
    el("sign-check").classList.toggle("on",on);
    el("sign-box").textContent=on?"✓":"";
    el("sign-btn").disabled=!on;
  });
  el("sign-btn").addEventListener("click",function(){
    if(el("sign-btn").disabled)return;
    signed=true; showResult(true);
  });

  function allYes(){ return ans.every(function(a){return a==="yes";}); }
  function answered(){ return ans.every(function(a){return a!==null;}); }

  function update(){
    var sign=el("sign");
    if(allYes()){
      sign.classList.remove("locked"); sign.classList.add("ready");
      el("sign-bar").textContent="서명 · 이제 스스로 확인하세요";
      el("locknote").textContent="체크 후 '확인 완료'를 누르면 이 매수가 규칙에 따른 것임을 스스로 기록합니다.";
    } else {
      sign.classList.add("locked"); sign.classList.remove("ready");
      el("sign-bar").textContent="서명 · 여섯 게이트 통과 후 활성화";
      el("sign-check").classList.remove("on"); el("sign-box").textContent="";
      el("sign-btn").disabled=true;
      var noCount=ans.filter(function(a){return a==="no";}).length;
      el("locknote").textContent = noCount>0
        ? ("NO가 "+noCount+"개 있습니다. 하나라도 NO면 오늘은 매수하지 않습니다.")
        : "여섯 게이트가 모두 YES가 되면 서명이 열립니다.";
    }
    // NO가 하나라도 있으면 STOP 결과 즉시
    if(answered() && !allYes()) showResult(false);
    else if(!signed) el("result").classList.remove("show");
    el("footer").innerHTML = "교육·자기점검 목적 · 특정 종목의 매수·매도 추천이 아님<br>투자 판단과 책임은 이용자 본인에게 있습니다";
  }

  function showResult(pass){
    var r=el("result");
    r.classList.add("show");
    r.classList.toggle("pass",pass);
    r.classList.toggle("stop",!pass);
    if(pass){
      el("result-bar").textContent="GATE · PASS";
      el("result-big").textContent="PASS";
      el("result-text").innerHTML="이것은 <b>수익 가능성이 높다는 뜻이 아닙니다.</b> 당신이 틀렸을 때를 미리 준비했다는 뜻입니다.";
      el("result-sub").textContent="이제 시장이 결정합니다.";
    } else {
      var noCount=ans.filter(function(a){return a==="no";}).length;
      el("result-bar").textContent="GATE · STOP";
      el("result-big").textContent="오늘은 아무것도 하지 않는다";
      el("result-text").innerHTML="게이트에 NO가 "+noCount+"개 있습니다. 하나라도 걸리면 진행하지 않습니다. <b>안 사는 것도 선택입니다.</b>";
      el("result-sub").textContent="게이트를 다시 채우거나, 오늘은 여기서 멈추세요.";
    }
    r.scrollIntoView({behavior:"smooth",block:"nearest"});
  }

  update();
})();
</script>

(function(){

    ja:{nv1:"資金の流れ",nv2:"リスク指数",nv3:"投資プレイブック",contactLabel:"お問い合わせ・ご提案",
